  - type: Features
    data:
      - name: Convenience Store Network
        description: >-
          Operates approximately 1,400 company-operated convenience stores under
          25+ regional brands across 30+ U.S. states and Washington D.C.
      - name: Fleet Fueling Cards
        description: >-
          Proprietary fleet fuel cards providing access to a nationwide network
          of fueling sites including cardlock locations for commercial fleets.
      - name: Wholesale Fuel Distribution
        description: >-
          Wholesale fuel supply to approximately 1,660 independent dealer sites
          through GPM Petroleum and ARKO Petroleum Corp.
      - name: Cardlock Operations
        description: >-
          Operates approximately 121 proprietary cardlock (unstaffed) fueling
          locations for fleet and commercial vehicle fueling.
  - type: UseCases
    data:
      - name: Fleet Fuel Management
        description: >-
          Commercial fleets use ARKO's proprietary fuel card network to manage
          fuel expenses and access cardlock fueling locations nationwide.
      - name: Convenience Retail
        description: >-
          Retail consumers purchase food, beverages, and fuel at ARKO-operated
          convenience stores under regional brand names.
      - name: Wholesale Fuel Supply
        description: >-
          Independent fuel dealers and operators receive wholesale fuel supply
          through ARKO's petroleum distribution network.
