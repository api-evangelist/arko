aid: arko
name: ARKO Corp
description: >-
  ARKO Corp (Nasdaq: ARKO) is a Fortune 500 company and one of the largest
  operators of convenience stores and wholesalers of fuel in the United States.
  Through its subsidiary GPM Investments, ARKO operates approximately 1,400
  company-operated stores under 25+ regional brands across 30+ states, as well
  as proprietary cardlock locations and a fleet fueling network. In 2026, ARKO
  completed the IPO of ARKO Petroleum Corp., which operates its wholesale,
  fleet fueling, and petroleum distribution segments.
